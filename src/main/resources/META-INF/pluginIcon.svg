<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <!-- 深色圆角背景 -->
  <rect width="40" height="40" rx="8" fill="#1E293B"/>

  <!-- 主分支竖线 -->
  <line x1="12" y1="10" x2="12" y2="32" stroke="#F97316" stroke-width="2.5" stroke-linecap="round"/>

  <!-- feature 分支曲线（从分支点弧形延伸到右上方） -->
  <path d="M12 22 C12 15 26 15 26 13" stroke="#FB923C" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- 主分支提交点 -->
  <circle cx="12" cy="10" r="3" fill="#F97316"/>
  <circle cx="12" cy="22" r="2.5" fill="#F97316"/>
  <circle cx="12" cy="32" r="3" fill="#F97316"/>

  <!-- feature 分支末端提交点 -->
  <circle cx="26" cy="13" r="2.5" fill="#FB923C"/>

  <!-- AI 四芒星（象征 AI 光点） -->
  <path d="M33 7.5 L34 10 L36.5 11 L34 12 L33 14.5 L32 12 L29.5 11 L32 10 Z" fill="#FCD34D"/>

  <!-- 装饰小点 -->
  <circle cx="36" cy="17" r="1.2" fill="#FCD34D" opacity="0.8"/>
  <circle cx="30" cy="7" r="0.9" fill="#FDBA74" opacity="0.7"/>
</svg>
